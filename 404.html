<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 - Page Not Found</title>

<!-- Font Awesome (for icons used in this page) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<!-- Site's real global stylesheets (fonts, variables, base reset, buttons) -->
<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="css/base.css" />

<!-- 404 page specific styles -->
<link rel="stylesheet" href="css/404.css" />
</head>
<body>

<!-- ==========================================================================
     If your site has a shared header/navbar, include/paste it here.
     Left out since it wasn't part of the CSS/JS you shared.
     ========================================================================== -->

<main>
  <section class="error-404-section">
    <div class="container">
      <div class="error-404-inner">

        <!-- LEFT: Content -->
        <div class="error-404-content">
          <span class="error-code">404</span>
          <h1>Oops! Page not found</h1>
          <p>
            The page you're looking for doesn't exist or may have been moved.
            Let's get you back on track.
          </p>

          <div class="error-404-actions">
            <button type="button" id="error404GoBack" class="btn btn-outline">
              <i class="fa-solid fa-arrow-left"></i> Go Back
            </button>
            <a href="index.html" class="btn btn-primary">
              <i class="fa-solid fa-house"></i> Back to Home
            </a>
            
          </div>

          
        </div>

        <!-- RIGHT: Illustration -->
        <div class="error-404-illustration">
          <div class="error-404-icon-wrap floaty">
            <i class="fa-solid fa-map-location-dot"></i>
          </div>
        </div>

      </div>
    </div>
  </section>
</main>

<!-- ==========================================================================
     If your site has a shared footer, include/paste it here.
     ========================================================================== -->

<script src="js/404.js"></script>
</body>
</html>
