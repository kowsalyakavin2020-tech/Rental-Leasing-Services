<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | RentLease</title>
  <meta name="description" content="Create your free RentLease account to start renting or listing today." />
  <link rel="icon" type="image/webp" href="assets/images/logo.webp" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <a href="index.html" class="back-home-btn">
    <i class="fa-solid fa-arrow-left"></i> Back to Home
  </a>

  <div class="auth-page">

    <!-- ===================== LEFT: ILLUSTRATION PANEL ===================== -->
    <div class="auth-visual-panel">
      <a href="index.html" class="auth-logo">
        <img src="assets/images/logo.webp" alt="RentLease logo" />
      </a>
      <div class="auth-visual-content" data-aos="fade-up">
        <img src="assets/images/auth-illustration.webp" alt="Join RentLease" class="auth-illustration floaty" />
        <h2>Join Thousands of Renters & Listers</h2>
        <p>Create your free account and start renting or earning from your own listings today.</p>
      </div>
      <div class="auth-visual-decor decor-1"></div>
      <div class="auth-visual-decor decor-2"></div>
    </div>

    <!-- ===================== RIGHT: SIGNUP FORM ===================== -->
    <div class="auth-form-panel">
      <div class="auth-form-wrapper gsap-auth-form">
        <span class="section-tag">Sign Up</span>
        <h1>Create Your Account</h1>
        <p class="auth-subtitle">It's free and takes less than a minute.</p>

        
        <form class="auth-form" id="signupForm" novalidate>
          <div class="form-group">
            <label for="signupRole">Sign Up As <span class="required">*</span></label>
            <select id="signupRole" required>
              <option value="" selected disabled>Select Role</option>
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="form-group">
            <label for="signupName">Full Name <span class="required">*</span></label>
            <input type="text" id="signupName" required />
            <span class="form-error" id="signupNameError"></span>
          </div>

          <div class="form-group">
            <label for="signupEmail">Email Address <span class="required">*</span></label>
            <input type="email" id="signupEmail" required />
            <span class="form-error" id="signupEmailError"></span>
          </div>

          <div class="form-group">
            <label for="signupPassword">Password <span class="required">*</span></label>
            <div class="password-field">
              <input type="password" id="signupPassword" required />
              <button type="button" class="password-toggle" data-target="signupPassword" aria-label="Show password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
            <div class="password-strength" id="passwordStrength">
              <div class="strength-bar"><span id="strengthBarFill"></span></div>
              <span class="strength-label" id="strengthLabel">Password strength</span>
            </div>
            <span class="form-error" id="signupPasswordError"></span>
          </div>

          <div class="form-group">
            <label for="signupConfirmPassword">Confirm Password <span class="required">*</span></label>
            <div class="password-field">
              <input type="password" id="signupConfirmPassword" required />
              <button type="button" class="password-toggle" data-target="signupConfirmPassword" aria-label="Show password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
            <span class="form-error" id="signupConfirmPasswordError"></span>
          </div>

          <label class="checkbox-label terms-label">
            <input type="checkbox" id="agreeTerms" required />
            <span>I agree to the <a href="404.html">Terms of Service</a> and <a href="404.html">Privacy Policy</a></span>
          </label>
          <span class="form-error" id="agreeTermsError"></span>

          <button type="submit" class="btn btn-primary auth-submit-btn">
            <i class="fa-solid fa-user-plus"></i> Create Account
          </button>

          <p class="form-success-message" id="signupSuccessMessage" style="display:none;">
            <i class="fa-solid fa-circle-check"></i> Account created! Welcome to RentLease.
          </p>
        </form>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Log In</a>
        </p>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/form-validation.js"></script>
</body>
</html>
