<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | RentLease</title>
  <meta name="description" content="Log in to your RentLease account to manage bookings and listings." />
  <link rel="icon" type="image/webp" href="assets/images/logo.webp" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <a href="index.html" class="back-home-btn">
    <i class="fa-solid fa-arrow-left"></i> Back to Home
  </a>

  <div class="auth-page">

    <!-- ===================== LEFT: ILLUSTRATION PANEL ===================== -->
    <div class="auth-visual-panel">
      <a href="index.html" class="auth-logo">
        <img src="assets/images/logo.webp" alt="RentLease logo" />
      </a>
      <div class="auth-visual-content" data-aos="fade-up">
        <img src="assets/images/auth-illustration.webp" alt="Welcome back" class="auth-illustration floaty" />
        <h2>Welcome Back to RentLease</h2>
        <p>Access your bookings, manage your listings, and pick up right where you left off.</p>
      </div>
      <div class="auth-visual-decor decor-1"></div>
      <div class="auth-visual-decor decor-2"></div>
    </div>

    <!-- ===================== RIGHT: LOGIN FORM ===================== -->
    <div class="auth-form-panel">
      <div class="auth-form-wrapper gsap-auth-form">
        <span class="section-tag">Log In</span>
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Log in to continue to your account.</p>

        
        

        <form class="auth-form" id="loginForm" novalidate>
          <div class="form-group">
            <label for="loginRole">Log In As <span class="required">*</span></label>
            <select id="loginRole" required>
              <option value="" selected disabled>Select Role</option>
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="form-group">
            <label for="loginEmail">Email Address <span class="required">*</span></label>
            <input type="email" id="loginEmail" required />
            <span class="form-error" id="loginEmailError"></span>
          </div>

          <div class="form-group">
            <label for="loginPassword">Password <span class="required">*</span></label>
            <div class="password-field">
              <input type="password" id="loginPassword" required />
              <button type="button" class="password-toggle" data-target="loginPassword" aria-label="Show password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
            <span class="form-error" id="loginPasswordError"></span>
          </div>

          <div class="auth-form-row">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>
            <a href="404.html" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary auth-submit-btn">
            <i class="fa-solid fa-right-to-bracket"></i> Log In
          </button>

          <p class="form-success-message" id="loginSuccessMessage" style="display:none;">
            <i class="fa-solid fa-circle-check"></i> Logged in successfully! Redirecting...
          </p>
        </form>

        <p class="auth-switch">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </p>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/form-validation.js"></script>
</body>
</html>
